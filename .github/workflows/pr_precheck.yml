name: PR PreCheck
on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  gatekeeper:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate PR
        uses: actions/github-script@v9
        with:
          script: |
            const LABEL_CODE_FREEZE = 'bot:code-freeze';
            const LABEL_BREAKING_POTENTIAL = 'bot:breaking-potential';
            const LABEL_NEEDS_CLEANUP = 'bot:needs-cleanup';
            const LABEL_NEEDS_MAINTAINER = 'bot:needs-maintainer';
            const LABEL_READY_FOR_REVIEW = 'bot:ready-for-review';
            const LABEL_CONFIRMED = 'bot:confirmed';
            const LABEL_UNCONFIRMED = 'bot:unconfirmed';
            const LABEL_MAINTAINER_READY = 'bot:maintainer-ready';

            const preCheck = await import(`${ github.workspace }/scripts/workflow.preCheck.js`);
            const { login: author, type: authorType } = context.payload.pull_request.user;
            const authorRole = context.payload.pull_request.author_association;

            if (preCheck.coreContributors({ author, authorType, authorRole })) {
              console.log(`Contributor found, skipping pre-checks: ${author}`);
              return;
            }

            // Code freeze confirmation
            const isFreezeActive = "${{ vars.RELEASE_FREEZE_ACTIVE }}" === "true";

            if (isFreezeActive) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, labels: [LABEL_CODE_FREEZE]
              }).catch(() => {});
            } else {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, name: LABEL_CODE_FREEZE
              }).catch(() => {});
            }

            const body = context.payload.pull_request.body || "";
            const fileCount = context.payload.pull_request.changed_files;
            const { data: changedFiles } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 50
            });
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number
            });
            const botAgreementSignature = '<!-- precheck-bot-agreement-V1 -->';
            const existingAgreement = comments.data.find(c => c.body.includes(botAgreementSignature));

            const botCommentSignature = '<!-- precheck-bot-comment-V1 -->';
            const existingComment = comments.data.find(c => c.body.includes(botCommentSignature));

            // Core contributors bypass
            if (preCheck.coreContributorsBypass({ author, authorType, authorRole, comments: comments.data })) {
              const bypassComment = `### 🤖 PR Quality PreCheck\n${botCommentSignature}\n` +
               `Bypass acknowledged, standing down!`;

              if (existingComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  comment_id: existingComment.id, body: bypassComment
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: context.issue.number, body: bypassComment
                });
              }

              return;
            }

            if (!existingAgreement) {
              const agreementComment = `### 🤖 PR Contributor's agreement\n${botAgreementSignature}\n` +
                 `I'm ready to help! Give my comment a 👍 to confirm you've read our [contribution guidelines](https://github.com/patternfly/patternfly-mcp/blob/main/CONTRIBUTING.md) and unlock the testing suite.`;

              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body: agreementComment
              });

              return;
            }

            const { data: reactions } = await github.rest.reactions.listForIssueComment({
              owner: context.repo.owner, repo: context.repo.repo,
              comment_id: existingComment.id
            });

            const authorReaction = reactions.find(r => r.user.login === author);
            const authorAgreement = authorReaction?.content || '0';
            const agreement = preCheck.contributorAgreement({ agreement: authorAgreement });

            if (agreement) {
              if (existingAgreement) {
                const agreementComment = `### 🤖 PR Contributor's agreement\n${botAgreementSignature}\n` +
                   `Thank you for accepting the contribution guidelines! Starting the testing suite.`;

                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: context.issue.number, body: agreementComment
                });
              }
            } else {
              if (agreement === false) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: context.issue.number, labels: [LABEL_UNCONFIRMED]
                }).catch(() => {});

                await github.rest.issues.removeLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: context.issue.number, name: LABEL_CONFIRMED
                }).catch(() => {});

              } else {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: context.issue.number, name: LABEL_CONFIRMED
                }).catch(() => {});

                await github.rest.issues.removeLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: context.issue.number, name: LABEL_UNCONFIRMED
                }).catch(() => {});
              }

              if (existingAgreement) {
                const agreementComment = `### 🤖 PR Contributor's agreement\n${botAgreementSignature}\n` +
                   `When you're ready to continue give my comment a 👍 to confirm you've read our [contribution guidelines](https://github.com/patternfly/patternfly-mcp/blob/main/CONTRIBUTING.md) and unlock the testing suite.`;

                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: context.issue.number, body: agreementComment
                });
              }

              return;
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, labels: [LABEL_CONFIRMED]
            }).catch(() => {});

            await github.rest.issues.removeLabel({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, name: LABEL_UNCONFIRMED
            }).catch(() => {});

            const codeSignature = preCheck.signatureScan({ body, changedFiles, fileCount });

            // Signature checks found feature-like work, notify the user they may not be following guidance
            if (codeSignature.hasTell) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, labels: [LABEL_BREAKING_POTENTIAL]
              }).catch(() => {});

              // GraphQL Mutation to convert to Draft
              const prNodeId = context.payload.pull_request.node_id;
              const mutation = `mutation($id: ID!) {
                convertPullRequestToDraft(input: { pullRequestId: $id }) {
                  pullRequest { id isDraft }
                }
              }`;

              await github.graphql(mutation, { id: prNodeId });

              core.setFailed("PR moved to Draft. Make sure to review the contributing guidelines regarding potential feature and generated work and why your PatternFly MCP contribution may require integration planning.");
              return;
            } else {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, name: LABEL_BREAKING_POTENTIAL
              }).catch(() => {});
            }

            // Signature checks found something, alert the contributor in good faith
            if (codeSignature.errors.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, labels: [LABEL_NEEDS_CLEANUP]
              }).catch(() => {});

              const botComment = `### 🤖 PR Quality PreCheck\n${botCommentSignature}\n` +
                `Thank you for the PR! Make sure you've reviewed the [contribution guidelines](https://github.com/patternfly/patternfly-mcp/blob/main/CONTRIBUTING.md). Once the following updates are addressed, you'll be queued for review:\n\n` +
                `${codeSignature.errors.map(err => `- ${err}`).join('\n')}\n\n` +
                `*This comment updates automatically.*`;

              if (existingComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  comment_id: existingComment.id, body: botComment
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: context.issue.number, body: botComment
                });
              }

              core.setFailed("PR pre-check requirements not met.");
              return;
            }

            // Fallback if signature checks fail, alert the maintainers
            if (codeSignature.hasFailed) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, labels: [LABEL_NEEDS_MAINTAINER]
              }).catch(() => {});

              const errorComment = `### 🤖 PR Quality PreCheck\n${botCommentSignature}\n` +
                `${codeSignature.errors.map(err => `- ${err}`).join('\n')}`;

              if (existingComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  comment_id: existingComment.id, body: errorComment
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: context.issue.number, body: errorComment
                });
              }

              return;
            }

            // Confirm the work has passed pre-check
            const successComment = `### 🤖 PR Quality PreCheck\n${botCommentSignature}\n` +
               `I've finished my initial scan and all checks pass!`;

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existingComment.id, body: successComment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body: successComment
              });
            }

            await github.rest.issues.removeLabel({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, name: LABEL_NEEDS_CLEANUP
            }).catch(() => {});

            await github.rest.issues.removeLabel({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, name: LABEL_NEEDS_MAINTAINER
            }).catch(() => {});

            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, labels: [LABEL_MAINTAINER_READY]
            }).catch(() => {});
