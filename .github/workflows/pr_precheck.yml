name: PR PreCheck
on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  gatekeeper:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate PR
        uses: actions/github-script@v9
        with:
          script: |
            const LABEL_CODE_FREEZE = 'bot:code-freeze';
            const LABEL_BREAKING_POTENTIAL = 'bot:breaking-potential';
            const LABEL_NEEDS_CLEANUP = 'bot:needs-cleanup';
            const LABEL_NEEDS_MAINTAINER = 'bot:needs-maintainer';
            const LABEL_CONFIRMED = 'bot:contributor-confirmed';
            const LABEL_UNCONFIRMED = 'bot:contributor-unconfirmed';
            const LABEL_PRECHECKS_PASS = 'bot:ready-for-testing';
            const LABEL_PRECHECKS_BYPASS = 'bot:maintainer-bypass';

            const preCheck = await import(`${github.workspace}/scripts/workflow.preCheck.js`);
            const { login: author, type: authorType } = context.payload.pull_request.user;
            const authorRole = context.payload.pull_request.author_association;

            if (preCheck.coreContributors({ author, authorType, authorRole })) {
              console.log(`Contributor found, skipping pre-checks: ${author}`);

              return;
            }

            const body = context.payload.pull_request.body || '';
            const fileCount = context.payload.pull_request.changed_files;
            const { data: changedFiles } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 50
            });
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number
            });

            const botCommentSignature = '<!-- precheck-bot-comment-V1 -->';
            const existingComment = comments.data.find(c => c.body.includes(botCommentSignature));

            // Code freeze confirmation
            const isFreezeActive = '${{ vars.RELEASE_FREEZE_ACTIVE }}' === 'true';

            if (isFreezeActive) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [LABEL_CODE_FREEZE]
              }).catch(() => {});
            } else {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: LABEL_CODE_FREEZE
              }).catch(() => {});
            }

            // Core contributors bypass
            if (preCheck.coreContributorsBypass({ author, authorType, authorRole, comments: comments.data })) {
              const bypassComment = `### 🤖 PR Quality Guidance\n${botCommentSignature}\n` +
                `Bypass acknowledged, standing down!\n\n` +
                `_This comment updates automatically._`;

              if (existingComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingComment.id,
                  body: bypassComment
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: bypassComment
                });
              }

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [LABEL_PRECHECKS_BYPASS]
              }).catch(() => {});

              return;
            }

            // Contributor's Agreement
            const isConfirmed = context.payload.pull_request.labels.some(label => label.name === LABEL_CONFIRMED);

            if (!isConfirmed) {
              const agreementCommentSignature = '<!-- precheck-bot-agreement-V1 -->';
              const existingAgreement = comments.data.find(c => c.body.includes(agreementCommentSignature));

              if (!existingAgreement) {
                const agreementComment = `### 🤖 PR Contributor's Agreement\n${agreementCommentSignature}\n` +
                  `I'm ready to help! Give my comment a 👍 to confirm you've read our [contribution guidelines](https://github.com/patternfly/patternfly-mcp/blob/main/CONTRIBUTING.md) and unlock the testing suite.`;

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: agreementComment
                });

                return;
              }

              const { data: reactions } = await github.rest.reactions.listForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingAgreement.id
              });

              const authorReaction = reactions.find(r => r.user.login === author);
              const updatedReaction = authorReaction?.content || '0';

              // No reaction
              if (updatedReaction === '0') {
                return;
              }

              // Thumbs down reaction
              if (updatedReaction === '-1') {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels: [LABEL_UNCONFIRMED]
                }).catch(() => {});

                const declinedComment = `### 🤖 PR Contributor's Agreement\n${agreementCommentSignature}\n` +
                  `🚫 I noticed you declined the agreement so I paused automation. If you change your mind, just change your reaction to a 👍!`;

                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingAgreement.id,
                  body: declinedComment
                });

                return;
              }

              // Thumbs up reaction
              if (updatedReaction === '+1') {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels: [LABEL_CONFIRMED]
                }).catch(() => {});

                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: LABEL_UNCONFIRMED
                }).catch(() => {});

                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingAgreement.id
                });
              }
            }

            // Signature checks found feature-like work, notify the user they may not be following guidance
            const codeSignature = preCheck.signatureScan({ body, changedFiles, fileCount });

            if (codeSignature.hasTell) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [LABEL_BREAKING_POTENTIAL]
              }).catch(() => {});

              // GraphQL Mutation to convert to Draft
              const prNodeId = context.payload.pull_request.node_id;
              const mutation = `mutation($id: ID!) {
                convertPullRequestToDraft(input: { pullRequestId: $id }) {
                  pullRequest { id isDraft }
                }
              }`;

              await github.graphql(mutation, { id: prNodeId });

              const botComment = `### 🤖 PR Quality Guidance\n${botCommentSignature}\n` +
                `I noticed there's quite a bit of work here. I'm moving this over to a draft PR temporarily. Make sure you review the [contribution guidelines](https://github.com/patternfly/patternfly-mcp/blob/main/CONTRIBUTING.md) again.\n\n` +
                `_This comment updates automatically._`;

              if (existingComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingComment.id,
                  body: botComment
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: botComment
                });
              }

              core.setFailed('PR moved to Draft. Make sure to review the contributing guidelines regarding potential feature and generated work and why your PatternFly MCP contribution may require planning.');

              return;
            } else {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: LABEL_BREAKING_POTENTIAL
              }).catch(() => {});
            }

            // Signature checks found something, alert the contributor in good faith
            if (codeSignature.errors.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [LABEL_NEEDS_CLEANUP]
              }).catch(() => {});

              const botComment = `### 🤖 PR Quality Guidance\n${botCommentSignature}\n` +
                `I found some issues with your work. Make sure you've reviewed the [contribution guidelines](https://github.com/patternfly/patternfly-mcp/blob/main/CONTRIBUTING.md). Once the following updates are addressed, you'll be queued for review:\n\n` +
                `${codeSignature.errors.map(err => `- ${err}`).join('\n')}\n\n` +
                `_This comment updates automatically._`;

              if (existingComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingComment.id,
                  body: botComment
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: botComment
                });
              }

              core.setFailed('PR pre-check requirements not met.');

              return;
            }

            // Fallback if signature checks fail, alert the maintainers
            if (codeSignature.hasFailed) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [LABEL_NEEDS_MAINTAINER]
              }).catch(() => {});

              const errorComment = `### 🤖 PR Quality Guidance\n${botCommentSignature}\n` +
                `${codeSignature.errors.map(err => `- ${err}`).join('\n')}\n\n` +
                `_This comment updates automatically._`;

              if (existingComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingComment.id,
                  body: errorComment
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: errorComment
                });
              }

              return;
            }

            // Confirm the work has passed pre-check
            const successComment = `### 🤖 PR Quality Guidance\n${botCommentSignature}\n` +
              `I finished my scan and all pre-checks pass!\n\n` +
              `_This comment updates automatically._`;

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: successComment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: successComment
              });
            }

            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: LABEL_NEEDS_CLEANUP
            }).catch(() => {});

            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: LABEL_NEEDS_MAINTAINER
            }).catch(() => {});

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [LABEL_PRECHECKS_PASS]
            }).catch(() => {});
