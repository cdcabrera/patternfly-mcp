name: Container
on:
  push:
    branches: [ main ]
    tags:
      - "*"
  pull_request:

jobs:
  Container-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js 24.x
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.x
          cache: npm

      - name: Install Node.js packages
        run: npm ci

      - name: Build image and run container tests
        run: npm run test:container
